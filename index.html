<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FBF7F0">
<link rel="manifest" href="manifest.json">
<title>Kinkeep</title>
<style>
:root{
  --paper:#FBF7F0;
  --ink:#2A2622;
  --ink-soft:#6B655C;
  --line:#E4DCCF;
  --sage:#5C7A5C;
  --sage-soft:#EAF0E6;
  --plum:#7A5C6E;
  --clay:#B5744A;
  --card:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--paper);color:var(--ink);font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,sans-serif;}
body{padding-bottom:80px;}
h1,h2,h3{font-family:Georgia,"Times New Roman",serif;}

header{padding:22px 20px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:40;}
.share-btn{position:absolute;top:20px;right:18px;width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--sage);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.share-btn svg{width:20px;height:20px;}
.share-block{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px;}
.share-block h3{font-size:16px;margin-bottom:4px;}
.share-block p{font-size:12.5px;color:var(--ink-soft);line-height:1.5;margin-bottom:10px;}
.codebox{width:100%;min-height:84px;font-size:11px;font-family:ui-monospace,Menlo,monospace;word-break:break-all;resize:vertical;background:var(--paper);}
.share-actions{display:flex;gap:9px;margin-top:10px;}
.share-actions button{flex:1;padding:12px;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--line);background:var(--card);color:var(--ink);}
.share-actions button.primary{background:var(--sage);color:#fff;border-color:var(--sage);}
.result-msg{font-size:13px;margin-top:10px;padding:10px 12px;border-radius:10px;background:var(--sage-soft);color:var(--sage);}
.brand{font-family:Georgia,serif;font-size:26px;letter-spacing:-.5px;}
.brand em{font-style:normal;color:var(--sage);}
.tag{font-size:12.5px;color:var(--ink-soft);margin-top:3px;}

.nudge{margin:14px 20px 0;background:var(--sage-soft);border:1px solid #d3e0cc;border-radius:14px;padding:13px 15px;display:flex;gap:11px;align-items:flex-start;}
.nudge .dot{width:9px;height:9px;border-radius:50%;background:var(--sage);margin-top:5px;flex-shrink:0;}
.nudge b{font-size:14px;}
.nudge p{font-size:13px;color:var(--ink-soft);margin-top:2px;line-height:1.4;}

main{padding:16px 20px 0;}
.sec-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin:22px 2px 10px;font-weight:600;}
.sec-label:first-child{margin-top:6px;}

.import-bar{margin:14px 20px 0;display:flex;gap:9px;}
.import-bar button{flex:1;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:11px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;display:flex;gap:7px;align-items:center;justify-content:center;font-family:inherit;}
.import-bar button svg{width:17px;height:17px;}

.person{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:9px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:transform .08s;}
.person:active{transform:scale(.99);}
.avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:18px;color:#fff;}
.pmain{flex:1;min-width:0;}
.pname{font-size:15.5px;font-weight:600;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.pmeta{font-size:12.5px;color:var(--ink-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chip{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:600;letter-spacing:.3px;}
.chip.family{background:#eef2ff;color:#4a5aa0;}
.chip.elder{background:#f6eef4;color:var(--plum);}
.last{font-size:11.5px;text-align:right;flex-shrink:0;}
.last .num{font-size:16px;font-weight:700;font-family:Georgia,serif;}
.last.overdue .num{color:var(--clay);}
.last.ok .num{color:var(--sage);}
.last small{display:block;color:var(--ink-soft);font-size:10px;}

.fab{position:fixed;right:18px;bottom:78px;width:56px;height:56px;border-radius:50%;background:var(--sage);color:#fff;border:none;font-size:30px;line-height:1;box-shadow:0 6px 18px rgba(92,122,92,.4);cursor:pointer;z-index:45;}

nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:45;}
nav button{flex:1;border:none;background:none;padding:9px 0 11px;font-size:10.5px;color:var(--ink-soft);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
nav button.on{color:var(--sage);}
nav button svg{width:22px;height:22px;}

.scrim{position:fixed;inset:0;background:rgba(42,38,34,.4);z-index:50;display:none;}
.scrim.show{display:block;}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--paper);border-radius:20px 20px 0 0;z-index:55;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.3,.9,.3,1);}
.sheet.show{transform:translateY(0);}
.sheet-head{padding:16px 20px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--paper);border-radius:20px 20px 0 0;}
.sheet-head h2{font-size:20px;}
.x{background:none;border:none;font-size:24px;color:var(--ink-soft);cursor:pointer;line-height:1;}
.sheet-body{padding:18px 20px 40px;}

label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin:14px 0 5px;letter-spacing:.3px;}
input,textarea,select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:15px;background:var(--card);color:var(--ink);font-family:inherit;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--sage);}
.hint{font-size:12px;color:var(--ink-soft);margin-top:5px;line-height:1.4;}
.tagpick{display:flex;flex-wrap:wrap;gap:8px;margin-top:5px;}
.tagpick button{border:1px solid var(--line);background:var(--card);padding:8px 13px;border-radius:20px;font-size:13px;cursor:pointer;color:var(--ink);font-family:inherit;}
.tagpick button.sel{background:var(--ink);color:#fff;border-color:var(--ink);}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--sage);color:#fff;font-size:15.5px;font-weight:600;cursor:pointer;margin-top:22px;font-family:inherit;}
.btn.ghost{background:none;color:var(--ink-soft);border:1px solid var(--line);margin-top:10px;}
.btn.danger{background:none;color:#c0392b;border:1px solid #f0c8c4;margin-top:10px;}
.btn.plum{background:var(--plum);}

.contact-row{display:flex;gap:9px;margin:16px 0 4px;}
.contact-row a{flex:1;text-align:center;padding:13px 6px;border-radius:12px;text-decoration:none;font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--card);color:var(--ink);display:flex;flex-direction:column;gap:4px;align-items:center;}
.contact-row a svg{width:20px;height:20px;}
.contact-hint{font-size:11.5px;color:var(--ink-soft);text-align:center;margin-top:6px;line-height:1.5;}

.kv{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px;gap:12px;}
.kv span:first-child{color:var(--ink-soft);white-space:nowrap;}
.kv b{text-align:right;}
.logbtn{width:100%;padding:12px;border:1px dashed var(--sage);color:var(--sage);background:var(--sage-soft);border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;margin-top:10px;font-family:inherit;}
.note{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;margin-top:8px;}
.note small{color:var(--ink-soft);display:block;margin-bottom:3px;}
.remove-box{margin-top:28px;border-top:1px solid var(--line);padding-top:20px;}
.remove-box p{font-size:13px;color:var(--ink-soft);line-height:1.5;margin-bottom:4px;}

.filter-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;}
.toggle-row .lbl{font-size:14px;}
.toggle-row .sub{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
.switch{width:46px;height:27px;border-radius:20px;background:var(--line);border:none;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
.switch.on{background:var(--sage);}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:left .2s;}
.switch.on::after{left:22px;}
.target-in{display:flex;align-items:center;gap:10px;margin-top:8px;}
.target-in input{width:80px;text-align:center;font-size:17px;font-weight:700;font-family:Georgia,serif;}

.progress{position:sticky;top:0;z-index:10;background:var(--sage);color:#fff;border-radius:12px;padding:12px 15px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.progress .big{font-family:Georgia,serif;font-size:20px;}
.progress small{opacity:.85;font-size:11.5px;}
.progress-bar{height:5px;background:rgba(255,255,255,.3);border-radius:3px;margin-top:7px;overflow:hidden;}
.progress-bar i{display:block;height:100%;background:#fff;border-radius:3px;transition:width .25s;}

.cand{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin-bottom:9px;display:flex;gap:11px;align-items:center;}
.cand.added{border-color:var(--sage);background:var(--sage-soft);}
.cand .pmain{flex:1;min-width:0;}
.cand .addbtn{border:1px solid var(--sage);background:var(--card);color:var(--sage);width:38px;height:38px;border-radius:50%;font-size:22px;line-height:1;cursor:pointer;flex-shrink:0;font-family:inherit;}
.cand.added .addbtn{background:var(--sage);color:#fff;}
.overdue-tag{font-size:10px;color:var(--clay);font-weight:600;}
.tip{font-size:12px;color:var(--sage);margin-top:6px;line-height:1.45;background:var(--sage-soft);padding:7px 10px;border-radius:9px;}
.tip-detail{font-size:13.5px;color:var(--ink);line-height:1.5;background:var(--sage-soft);border:1px solid #d3e0cc;padding:12px 14px;border-radius:12px;margin-top:16px;}
.tip-detail b{color:var(--sage);}

.count-pill{text-align:center;font-family:Georgia,serif;font-size:15px;padding:12px;background:var(--sage-soft);border-radius:12px;margin:14px 0;color:var(--sage);}
.empty{text-align:center;color:var(--ink-soft);font-size:13.5px;padding:40px 20px;line-height:1.6;}
.stat-row{display:flex;gap:10px;margin-bottom:6px;}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center;}
.stat .n{font-family:Georgia,serif;font-size:26px;font-weight:700;}
.stat .l{font-size:11px;color:var(--ink-soft);margin-top:2px;}
.kids-list{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px;}
.kid-tag{background:#eef2ff;color:#4a5aa0;border-radius:8px;padding:5px 9px;font-size:12px;display:flex;align-items:center;gap:6px;}
.kid-tag button{border:none;background:none;color:#4a5aa0;font-size:15px;cursor:pointer;line-height:1;padding:0;}
</style>
</head>
<body>

<header>
  <button class="share-btn" onclick="openShareSheet()" aria-label="Share and sync">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="18" cy="5" r="2.6"/><circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="19" r="2.6"/><path d="M8.3 10.8l7.4-4.3M8.3 13.2l7.4 4.3"/></svg>
  </button>
  <div class="brand">Kin<em>keep</em></div>
  <div class="tag">The people your family is growing with.</div>
</header>

<div id="app"></div>
<button class="fab" onclick="openEdit()">+</button>

<nav>
  <button id="nav-people" class="on" onclick="go('people')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/><circle cx="17" cy="9" r="2.4"/><path d="M15 14.5c2.8 0 4.5 1.8 4.5 4.5"/></svg>
    People
  </button>
  <button id="nav-touch" onclick="go('touch')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.5 8.5 0 0 1-12.5 7.5L4 20l1-4.5A8.5 8.5 0 1 1 21 11.5z"/></svg>
    Keep up
  </button>
  <button id="nav-groups" onclick="go('groups')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h10"/><circle cx="19" cy="18" r="2.2"/></svg>
    Gather
  </button>
</nav>

<div class="scrim" id="scrim" onclick="closeAll()"></div>
<div class="sheet" id="sheet"><div id="sheet-content"></div></div>

<script>
const PALETTE={family:'#4a5aa0',elder:'#7A5C6E'};
const TYPES={family:'Family',elder:'Elder'};
const INTERESTS=['Playdates','Gives gifts','Church','Neighbors','Baking','Gardening','Music','Sports','Grandparent-age'];

let people=[];
let gather={type:'all',interests:[],target:15,favorStale:true,tenure:'any',ageMatch:'off',selected:new Set()};
// our own kids' ages, used for the "similar-age kids" lean (editable in the age control)
let myKids=[3,5];

// ---------- Storage (phone-native; persists offline as an installed app) ----------
const STORE_KEY='kinkeep.people.v1';
const KIDS_KEY='kinkeep.mykids.v1';
async function load(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){people=JSON.parse(raw);}
    else{people=seed();persist();}
    const rk=localStorage.getItem(KIDS_KEY);
    if(rk)myKids=JSON.parse(rk);
  }catch(e){people=seed();}
  render();
}
function persist(){try{localStorage.setItem(STORE_KEY,JSON.stringify(people));localStorage.setItem(KIDS_KEY,JSON.stringify(myKids));}catch(e){}}
async function savePerson(){persist();}
async function saveAll(){persist();}
async function deletePerson(id){people=people.filter(p=>p.id!==id);persist();}


function seed(){
  const now=Date.now(),D=86400000,Y=365*D;
  return [
    {id:'p1',sample:true,name:'The Alvarez Family',type:'family',metDate:now-40*D,work:'She teaches 2nd grade; he runs a landscaping crew',address:'',kids:[3,5],interests:['Playdates','Neighbors'],lastContact:now-3*D,logs:[{t:now-3*D,note:'Met at the splash pad. Their girl is same age as ours.'}]},
    {id:'p2',sample:true,name:'Miss Dorothy',type:'elder',metDate:now-90*D,work:'Retired church organist',address:'44 Linden Ave, Apt 2B',kids:[],interests:['Grandparent-age','Gives gifts','Church'],lastContact:now-1*D,logs:[{t:now-1*D,note:'Left cookies on our porch again. Send thank-you card.'}]},
    {id:'p3',sample:true,name:'The Okafor Family',type:'family',metDate:now-60*D,work:'Both physicians at the regional hospital',address:'',kids:[2,4],interests:['Playdates','Music'],lastContact:now-32*D,logs:[{t:now-32*D,note:'Talked about doing a music class together.'}]},
    {id:'p4',sample:true,name:'Walt & Rosemary',type:'elder',metDate:now-120*D,work:'Retired; Walt was a mailman for 30 years',address:'12 Old Mill Rd',kids:[],interests:['Grandparent-age','Gardening'],lastContact:now-48*D,logs:[]},
    {id:'p5',sample:true,name:'The Bianchi Family',type:'family',metDate:now-20*D,work:'She owns the bakery downtown; he does IT from home',address:'',kids:[4],interests:['Playdates','Baking'],lastContact:now-9*D,logs:[]},
  ];
}
async function removeSamples(){
  if(!confirm('Remove the example people? Anyone you added yourself stays.'))return;
  people=people.filter(p=>!p.sample);persist();render();
}

// ---------- Helpers ----------
function daysSince(t){return Math.floor((Date.now()-t)/86400000);}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let searchQ='';
function initials(n){const w=n.replace(/^The /,'').split(/[\s&]+/).filter(Boolean);return(w[0]?.[0]||'')+(w[1]?.[0]||'');}
function staleThreshold(type){return type==='elder'?14:30;}
function isStale(p){return daysSince(p.lastContact)>=staleThreshold(p.type);}
function fmtLast(p){const d=daysSince(p.lastContact);if(d===0)return'today';if(d===1)return'1 day';if(d<30)return d+' days';return Math.floor(d/30)+'mo';}
function fmtDate(t){if(!t)return'—';return new Date(t).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}
function knownFor(p){
  const d=daysSince(p.metDate||Date.now());
  if(d<30)return'just met';
  if(d<365)return'known '+Math.max(1,Math.round(d/30))+'mo';
  const y=(d/365);
  return 'known '+(y<1.5?'1 yr':Math.round(y)+' yrs');
}
function kidsSummary(p){if(!p.kids||!p.kids.length)return'';const n=p.kids.length;return `${n} ${n===1?'kid':'kids'} · ages ${p.kids.slice().sort((a,b)=>a-b).join(', ')}`;}
function smsURL(body){return 'sms:?&body='+encodeURIComponent(body||'');}

// ---------- Discussion tips: gentle, offline, keyed to what you've recorded ----------
// Soft suggestions for building trust over time. Not scripts — nudges.
function discussionTip(p){
  const d=daysSince(p.metDate||Date.now());
  const newish=d<270;
  const longtime=d>365*3;
  const pool=[];

  // Universal, low-pressure openers
  pool.push("Ask about something they mentioned last time — people feel remembered when you follow up.");
  pool.push("Share a small update from your week first; it invites them to do the same.");

  if(newish){
    pool.push("Still getting to know them — keep it light and curious, no big asks yet.");
    pool.push("Ask what brought them to the area or how they know the people you met through.");
  }
  if(longtime){
    pool.push("You go back years — a shared memory or 'remember when' lands warmly here.");
    pool.push("Long friendships deepen by asking how they're really doing, not just logistics.");
  }
  if(p.type==='family'){
    if(p.kids&&p.kids.length){
      const ages=p.kids.slice().sort((a,b)=>a-b);
      pool.push(`Ask how the kids are — you noted ages ${ages.join(' and ')}. Milestones make easy, warm talk.`);
      pool.push("Offer a specific playdate window rather than 'sometime' — it's easier to say yes to.");
    } else {
      pool.push("Ask about their family and what a typical week looks like for them.");
    }
  }
  if(p.type==='elder'){
    pool.push("Elders often treasure being asked about their own story — their work, their younger years.");
    pool.push("A short 'thinking of you' with no agenda means a lot; not every message needs a reason.");
  }
  if(p.interests&&p.interests.includes('Gives gifts')){
    pool.push("They're generous with gifts — make sure they feel appreciated, not just on the receiving end of thanks.");
  }
  if(p.interests&&p.interests.includes('Church')) pool.push("Faith matters to them — asking about their community or season shows you see what they value.");
  if(p.interests&&p.interests.includes('Gardening')) pool.push("Ask what's growing right now — gardeners love sharing the season's progress.");
  if(p.interests&&p.interests.includes('Music')) pool.push("Ask what they've been listening to or playing lately.");
  if(p.interests&&p.interests.includes('Baking')) pool.push("Ask what they've baked recently — maybe swap a recipe.");
  if(p.work) pool.push(`They work in: ${p.work.split(/[;,]/)[0].trim()}. A genuine question about it shows real interest.`);

  // Stable pick per person per day, so it doesn't flicker on every render
  const seed=(p.id||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0)+Math.floor(Date.now()/86400000);
  return pool[seed % pool.length];
}


// ---------- Contact import (Contact Picker API where available) ----------
async function importContact(){
  if('contacts' in navigator && 'ContactsManager' in window){
    try{
      const props=['name'];
      const opts={multiple:false};
      const sel=await navigator.contacts.select(props,opts);
      if(sel && sel.length){
        const nm=(sel[0].name&&sel[0].name[0])||'';
        closeAll();openEdit(null,nm);
        return;
      }
    }catch(e){/* user cancelled or blocked */}
  } else {
    alert("Your phone's browser doesn't allow picking contacts here (Apple blocks it in-browser). Add the name manually — type it exactly as it appears in your contacts so texting finds them.");
    openEdit();
  }
}

// ---------- Nav ----------
let view='people';
function go(v){view=v;['people','touch','groups'].forEach(x=>document.getElementById('nav-'+x).classList.toggle('on',x===v));render();}
function render(){
  const app=document.getElementById('app');
  if(view==='people')app.innerHTML=renderPeople();
  else if(view==='touch')app.innerHTML=renderTouch();
  else app.innerHTML=renderGroups();
  if(view==='groups')bindGroups();
}

// ---------- People view ----------
const SHARE_TIME_KEY='kinkeep.lastshare.v1';
function lastShareDays(){
  try{const t=parseInt(localStorage.getItem(SHARE_TIME_KEY)||'0',10);if(!t)return null;return daysSince(t);}catch(e){return null;}
}
function markShared(){try{localStorage.setItem(SHARE_TIME_KEY,String(Date.now()));}catch(e){}}

function renderPeople(){
  const quietest=people.slice().sort((a,b)=>a.lastContact-b.lastContact)[0];
  const nudge=quietest?`<div class="nudge"><div class="dot"></div><div><b>Quietest lately: ${esc(quietest.name)}</b><p>Last reached out ${fmtLast(quietest)} ago. The Keep up tab ranks everyone by who's gone quiet longest.</p></div></div>`:'';
  const lsd=lastShareDays();
  const backup=(people.some(p=>!p.sample))&&(lsd===null||lsd>30)?`<div class="nudge" style="background:#fdf3e3;border-color:#ecd9b0"><div class="dot" style="background:var(--amber,#C99A3E)"></div><div><b>${lsd===null?'No backup code sent yet':'Last code shared '+lsd+' days ago'}</b><p>The share code is also your backup. Tap the share icon, send one to your spouse — takes a minute.</p></div></div>`:'';
  const samples=people.filter(p=>p.sample).length;
  const sampleBar=samples?`<div class="import-bar"><button onclick="removeSamples()" style="color:var(--clay)">Remove the ${samples} example people</button></div>`:'';
  const imp=`<div class="import-bar">
    <button onclick="importContact()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg>Add from contacts</button>

  return nudge+backup+sampleBar+imp+searchBar+'<main id="people-list">'+peopleListHTML()+'</main>';

function matchFilter(p){
  if(gather.type!=='all'&&p.type!==gather.type)return false;

}

function editMyKids(){
  const cur=myKids.join(', ');

// smallest gap between any of our kids and any of theirs; lower = closer match
function ageGap(p){
  if(!myKids.length||!p.kids||!p.kids.length)return null;
  let best=Infinity;
  myKids.forEach(a=>p.kids.forEach(b=>{best=Math.min(best,Math.abs(a-b));}));
  return best;
}
function tenureDays(p){return daysSince(p.metDate||Date.now());}
function gatherScore(p){
  // Higher score = higher up the list. All leans are soft weights, never filters.
  let s=0;
  const td=tenureDays(p);
  if(gather.tenure==='newer')      s+= Math.max(0, 730 - td);
  else if(gather.tenure==='established') s+= (td>=365 && td<=3650)? 800 : 0;
  else if(gather.tenure==='oldest') s+= td;
  if(gather.favorStale)            s+= daysSince(p.lastContact)*2;
  if(gather.ageMatch==='on'){
    const g=ageGap(p);
    if(g!==null)      s+= Math.max(0, 1000 - g*150); // closer ages → bigger boost
  }
  return s;
}
function drawResults(){
  let matched=people.filter(matchFilter);
  const leaning = gather.tenure!=='any' || gather.favorStale || gather.ageMatch==='on';
  if(leaning) matched.sort((a,b)=>gatherScore(b)-gatherScore(a));
  else matched.sort((a,b)=>a.name.localeCompare(b.name));
  const box=document.getElementById('results');

  </div>`;

  if(!matched.length){box.innerHTML=html+'<div class="empty">No matches. Loosen a filter to widen the pool.</div>';return;}

  matched.forEach(p=>{
    const added=gather.selected.has(p.id);
    const ov=false;
    const meta=p.type==='family'&&p.kids&&p.kids.length?kidsSummary(p):p.interests.slice(0,3).join(' · ');

    html+=`<div class="cand ${added?'added':''}">
      <div class="avatar" style="background:${PALETTE[p.type]}">${initials(p.name)}</div>
      <div class="pmain">

  });

  if(n>0){
    const body=`You're invited! We're hosting a get-together and would love for you to come. Details to follow — hope you can make it!`;
    html+=`<a class="btn plum" style="display:block;text-align:center;text-decoration:none;box-sizing:border-box;padding:14px;border-radius:12px;color:#fff;font-size:15.5px;font-weight:600;margin-top:16px" href="${smsURL(body)}" onclick="logSelected()">Draft invite for ${n} on the list</a>

// ---------- Share / manual sync ----------
function encodeData(){
  const payload=JSON.stringify({v:1,when:Date.now(),people});
  return 'KINKEEP1:'+btoa(unescape(encodeURIComponent(payload)));
}
function decodeData(str){
  str=(str||'').trim();
  const i=str.indexOf('KINKEEP1:');
  if(i>=0)str=str.slice(i+9);
  str=str.replace(/\s+/g,'');
  const json=decodeURIComponent(escape(atob(str)));
  const obj=JSON.parse(json);
  if(!obj||!Array.isArray(obj.people))throw new Error('bad');
  return obj.people;
}
async function mergeIncoming(incoming){
  const norm=s=>(s||'').trim().toLowerCase();
  const byName={};people.forEach(p=>byName[norm(p.name)]=p);
  let added=0,updated=0;
  incoming.forEach(inc=>{
    const ex=byName[norm(inc.name)];
    if(!ex){
      inc.id='p'+Date.now()+Math.floor(Math.random()*100000);
      inc.logs=inc.logs||[];inc.interests=inc.interests||[];inc.kids=inc.kids||[];
      people.push(inc);byName[norm(inc.name)]=inc;added++;
    }else{
      ex.lastContact=Math.max(ex.lastContact||0,inc.lastContact||0);
      if(inc.metDate)ex.metDate=Math.min(ex.metDate||inc.metDate,inc.metDate);
      if(!ex.work&&inc.work)ex.work=inc.work;
      if(!ex.address&&inc.address)ex.address=inc.address;
      if((!ex.kids||!ex.kids.length)&&inc.kids&&inc.kids.length)ex.kids=inc.kids;
      ex.interests=[...new Set([...(ex.interests||[]),...(inc.interests||[])])];
      ex.logs=ex.logs||[];
      const seen=new Set(ex.logs.map(l=>l.t));
      (inc.logs||[]).forEach(l=>{if(!seen.has(l.t)){ex.logs.push(l);seen.add(l.t);}});
      ex.logs.sort((a,b)=>a.t-b.t);
      updated++;
    }
  });
  await saveAll();
  return {added,updated};
}
function openShareSheet(){
  const c=document.getElementById('sheet-content');
  c.innerHTML=`
    <div class="sheet-head"><h2>Share with your spouse</h2><button class="x" onclick="closeAll()">×</button></div>
    <div class="sheet-body">
      <div class="share-block">
        <h3>Send your list</h3>
        <p>Creates a code with everyone in your Kinkeep. Send it to your spouse in a text — she pastes it into hers and it merges in.</p>
        <textarea class="codebox" id="export-code" readonly placeholder="Tap Create code to generate"></textarea>
        <div class="share-actions">
          <button class="primary" onclick="makeCode()">Create code</button>
          <button onclick="copyCode()">Copy</button>
          <button onclick="shareCode()">Send…</button>
        </div>
      </div>
      <div class="share-block">
        <h3>Add her list to mine</h3>
        <p>Paste a code she sent you. New people get added; anyone you both have gets combined — most recent visit and all notes are kept.</p>
        <textarea class="codebox" id="import-code" placeholder="Paste the code she sent you here"></textarea>
        <div class="share-actions">
          <button class="primary" onclick="doImport()">Merge into my list</button>
        </div>
        <div id="import-result"></div>
      </div>
    </div>`;
  openSheet();
}
function makeCode(){document.getElementById('export-code').value=encodeData();markShared();}
function copyCode(){
  const ta=document.getElementById('export-code');
  if(!ta.value)makeCode();
  ta.select();
  navigator.clipboard?.writeText(ta.value).then(()=>flash('Copied — paste it into a text message.')).catch(()=>{document.execCommand('copy');flash('Copied.');});
}
async function shareCode(){
  const ta=document.getElementById('export-code');
  if(!ta.value)makeCode();
  const text=ta.value;
  if(navigator.share){try{await navigator.share({title:'Kinkeep list',text});return;}catch(e){}}
  copyCode();
}
async function doImport(){
  const raw=document.getElementById('import-code').value;
  const box=document.getElementById('import-result');
  let incoming;
  try{incoming=decodeData(raw);}catch(e){box.innerHTML=`<div class="result-msg" style="background:#fbe9df;color:var(--clay)">That code didn't read correctly. Ask her to send it again — copy the whole thing.</div>`;return;}
  const {added,updated}=await mergeIncoming(incoming);
  markShared();
  box.innerHTML=`<div class="result-msg">${added} added, ${updated} updated. Your lists are in sync.</div>`;
  document.getElementById('import-code').value='';
  render();
}
function flash(msg){
  const el=document.getElementById('import-result')||document.body;
  const d=document.createElement('div');d.className='result-msg';d.textContent=msg;d.style.margin='10px 20px';
  const host=document.querySelector('.sheet-body');(host||document.body).appendChild(d);
  setTimeout(()=>d.remove(),2200);
}

// ---------- Sheet controls ----------
function openSheet(){document.getElementById('scrim').classList.add('show');requestAnimationFrame(()=>document.getElementById('sheet').classList.add('show'));}
function closeAll(){document.getElementById('sheet').classList.remove('show');document.getElementById('scrim').classList.remove('show');}

load();

    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
}catch(e){}
